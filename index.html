<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To The End — MCR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #8b0000;
    --blood: #c0392b;
    --crimson: #e74c3c;
    --black: #050505;
    --dark: #0f0f0f;
    --paper: #1a1010;
    --text: #d4c5b0;
    --dim: #7a6a5a;
  }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Text', serif;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Blood drip background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 0%, rgba(139,0,0,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(139,0,0,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .card {
    position: relative;
    z-index: 1;
    width: min(560px, 95vw);
    background: var(--dark);
    border: 1px solid rgba(139,0,0,0.3);
    box-shadow: 
      0 0 0 1px rgba(139,0,0,0.1),
      0 0 40px rgba(139,0,0,0.15),
      0 0 80px rgba(0,0,0,0.8),
      inset 0 0 60px rgba(0,0,0,0.5);
    padding: 0;
    overflow: hidden;
    animation: cardIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Album art header */
  .album-header {
    position: relative;
    height: 280px;
    overflow: hidden;
  }

  .album-header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    filter: saturate(0.7) contrast(1.1);
    transition: filter 0.5s;
  }

  .album-header.playing img {
    filter: saturate(0.9) contrast(1.2);
  }

  .album-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.0) 40%,
      rgba(15,15,15,0.95) 100%
    );
  }

  .band-name {
    position: absolute;
    bottom: 16px;
    left: 20px;
    right: 20px;
  }

  .band-name h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.1rem, 3vw, 1.3rem);
    color: var(--blood);
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }

  .band-name h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    color: var(--text);
    letter-spacing: 3px;
    line-height: 1;
    text-shadow: 2px 2px 0 var(--red), 0 0 20px rgba(139,0,0,0.4);
  }

  /* Divider */
  .divider {
    height: 2px;
    background: linear-gradient(to right, transparent, var(--blood), var(--crimson), var(--blood), transparent);
    position: relative;
  }

  .divider::after {
    content: '✦';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: var(--crimson);
    background: var(--dark);
    padding: 0 8px;
    font-size: 10px;
  }

  /* Player section */
  .player {
    padding: 20px 24px 16px;
    background: rgba(0,0,0,0.3);
  }

  .player-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .vinyl {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: conic-gradient(
      #1a1a1a 0deg, #2a2a2a 10deg, #1a1a1a 20deg,
      #2a2a2a 30deg, #1a1a1a 40deg, #2a2a2a 50deg,
      #1a1a1a 60deg, #2a2a2a 70deg, #1a1a1a 80deg,
      #2a2a2a 90deg, #1a1a1a 100deg, #2a2a2a 110deg,
      #1a1a1a 120deg, #2a2a2a 130deg, #1a1a1a 140deg,
      #2a2a2a 150deg, #1a1a1a 160deg, #2a2a2a 170deg,
      #1a1a1a 180deg, #2a2a2a 190deg, #1a1a1a 200deg,
      #2a2a2a 210deg, #1a1a1a 220deg, #2a2a2a 230deg,
      #1a1a1a 240deg, #2a2a2a 250deg, #1a1a1a 260deg,
      #2a2a2a 270deg, #1a1a1a 280deg, #2a2a2a 290deg,
      #1a1a1a 300deg, #2a2a2a 310deg, #1a1a1a 320deg,
      #2a2a2a 330deg, #1a1a1a 340deg, #2a2a2a 350deg, #1a1a1a 360deg
    );
    border: 2px solid #333;
    box-shadow: inset 0 0 0 10px #111, inset 0 0 0 12px #222, inset 0 0 0 18px #111;
    flex-shrink: 0;
    transition: transform 0.1s;
  }

  .vinyl.spinning {
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .track-info { flex: 1; }

  .track-title {
    font-family: 'Special Elite', cursive;
    font-size: 1.05rem;
    color: var(--text);
    letter-spacing: 1px;
  }

  .track-album {
    font-size: 0.78rem;
    color: var(--dim);
    font-style: italic;
    margin-top: 2px;
  }

  /* Audio element hidden */
  #audio { display: none; }

  /* Progress bar */
  .progress-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(139,0,0,0.2);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, var(--red), var(--crimson));
    border-radius: 2px;
    transition: width 0.3s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--crimson);
    box-shadow: 0 0 6px var(--crimson);
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--dim);
    font-family: 'Special Elite', cursive;
    margin-top: 4px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 10px;
  }

  .btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--dim);
    transition: color 0.2s, transform 0.1s;
    padding: 4px;
    line-height: 1;
  }

  .btn:hover { color: var(--crimson); }
  .btn:active { transform: scale(0.92); }

  .btn-play {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--red);
    border: 1px solid var(--crimson);
    color: white;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(139,0,0,0.4);
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
  }

  .btn-play:hover {
    background: var(--blood);
    box-shadow: 0 0 24px rgba(192,57,43,0.5);
  }

  .btn-play:active { transform: scale(0.94); }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }

  .volume-row span { font-size: 0.75rem; color: var(--dim); }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: rgba(139,0,0,0.25);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--crimson);
    cursor: pointer;
  }

  /* Lyrics section */
  .lyrics-section {
    padding: 20px 24px 28px;
    border-top: 1px solid rgba(139,0,0,0.15);
  }

  .lyrics-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--blood);
    margin-bottom: 16px;
    text-align: center;
  }

  .lyrics-container {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .lyric-line {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .lyric-line.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .lyric-line.active .en {
    color: #ffffff;
    text-shadow: 0 0 20px rgba(192,57,43,0.6);
  }

  .lyric-line.active .es {
    color: var(--blood);
  }

  .en {
    font-family: 'Special Elite', cursive;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    color: var(--text);
    line-height: 1.4;
    transition: color 0.4s, text-shadow 0.4s;
  }

  .es {
    font-family: 'Crimson Text', serif;
    font-size: clamp(0.82rem, 2.5vw, 0.95rem);
    color: var(--dim);
    font-style: italic;
    margin-top: 3px;
    line-height: 1.4;
    transition: color 0.4s;
  }

  /* Bloodsplat decorative dots */
  .splat {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin: 10px 0;
  }

  .splat span {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--blood);
    opacity: 0.5;
  }

  /* Footer */
  .card-footer {
    padding: 12px 24px 18px;
    border-top: 1px solid rgba(139,0,0,0.1);
    text-align: center;
  }

  .card-footer p {
    font-size: 0.72rem;
    color: var(--dim);
    font-style: italic;
    letter-spacing: 1px;
  }

  /* Waveform bars (decorative) */
  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    justify-content: center;
    height: 20px;
    margin: 8px 0;
  }

  .wave-bar {
    width: 3px;
    background: var(--red);
    border-radius: 2px;
    opacity: 0.3;
    height: 4px;
    transition: height 0.1s, opacity 0.1s;
  }

  .waveform.active .wave-bar {
    opacity: 0.7;
    animation: wave 0.8s ease-in-out infinite alternate;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.05s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { animation-delay: 0.25s; }
  .wave-bar:nth-child(7) { animation-delay: 0.08s; }
  .wave-bar:nth-child(8) { animation-delay: 0.18s; }
  .wave-bar:nth-child(9) { animation-delay: 0.12s; }
  .wave-bar:nth-child(10) { animation-delay: 0.22s; }

  @keyframes wave {
    from { height: 4px; }
    to { height: 18px; }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .album-header { height: 220px; }
    .player, .lyrics-section { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<div class="card" id="card">

  <!-- Album art -->
  <div class="album-header" id="albumHeader">
    <img src="1000869256.jpg" alt="Three Cheers for Sweet Revenge" id="albumImg"
         onerror="this.style.display='none'; document.getElementById('albumHeader').style.background='linear-gradient(135deg, #1a0000, #0f0f0f)'">
    <div class="album-overlay"></div>
    <div class="band-name">
      <h2>My Chemical Romance</h2>
      <h1>To The End</h1>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Player -->
  <div class="player">
    <audio id="audio" preload="auto">
      <source src="To the End.mp3" type="audio/mpeg">
    </audio>

    <div class="player-info">
      <div class="vinyl" id="vinyl"></div>
      <div class="track-info">
        <div class="track-title">To The End</div>
        <div class="track-album">Three Cheers for Sweet Revenge · 2004</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeCurrent">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <!-- Waveform -->
    <div class="waveform" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" onclick="seekRelative(-10)" title="Atrás 10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.5 3C8.4 3 4.9 5.5 3.4 9H1l3.5 3.5L8 9H5.6C6.9 6.6 9.5 5 12.5 5c4.1 0 7.5 3.4 7.5 7.5S16.6 20 12.5 20 5 16.6 5 12.5H3C3 17.7 7.3 22 12.5 22S22 17.7 22 12.5 17.7 3 12.5 3z"/>
          <text x="9" y="15" font-size="6" fill="currentColor" font-family="sans-serif">10</text>
        </svg>
      </button>

      <button class="btn btn-play" id="btnPlay" onclick="togglePlay()">
        <svg id="iconPlay" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <button class="btn" onclick="seekRelative(10)" title="Adelante 10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.5 3C15.6 3 19.1 5.5 20.6 9H23l-3.5 3.5L16 9h2.4C17.1 6.6 14.5 5 11.5 5 7.4 5 4 8.4 4 12.5S7.4 20 11.5 20 19 16.6 19 12.5h2C21 17.7 16.7 22 11.5 22S1 17.7 1 12.5 5.3 3 11.5 3z"/>
          <text x="8" y="15" font-size="6" fill="currentColor" font-family="sans-serif">10</text>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <span>♪</span>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>

  <!-- Lyrics -->
  <div class="lyrics-section">
    <div class="lyrics-header">— Lyrics —</div>

    <div class="lyrics-container" id="lyricsContainer">
      <!-- Lines injected by JS -->
    </div>

    <div class="splat">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <p>Three Cheers for Sweet Revenge · My Chemical Romance · 2004</p>
  </div>

</div>

<script>
  // ── Lyrics data with timestamps (seconds) ──────────────────────────
  // Timestamps for "To the End" — focused on the highlighted section
  // plus surrounding context lines for a complete experience
  const lyrics = [
    { t: 0,   en: "La la la la la la la la",             es: "La la la la la la la la" },
    { t: 8,   en: "So take me from the wreckage",        es: "Así que llévame entre los escombros" },
    { t: 13,  en: "Save me from the blast",              es: "Sálvame de la explosión" },
    { t: 18,  en: "And take me far from danger",         es: "Y llévame lejos del peligro" },
    { t: 22,  en: "And take me far from here...",        es: "Y llévame lejos de aquí..." },
    { t: 30,  en: "If you marry me",                     es: "Si te casaras conmigo" },
    { t: 35,  en: "Would you bury me?",                  es: "¿Me enterrarías?" },
    { t: 40,  en: "Would you carry me to the end?",      es: "¿Me llevarías hasta el final?" },
    { t: 47,  en: "To the vows you take",                es: "A los votos que haces" },
    { t: 52,  en: "(And say goodbye) to the life you make", es: "(Y di adiós) a la vida que construiste" },
    { t: 58,  en: "(And say goodbye) to the heart you break", es: "(Y di adiós) al corazón que rompiste" },
    { t: 65,  en: "And all the cyanide you drank",       es: "Y todo el cianuro que bebiste" },
    { t: 73,  en: "Come on, come on...",                  es: "Vamos, vamos..." },
    { t: 80,  en: "And in the middle of the night",      es: "Y en medio de la noche" },
    { t: 86,  en: "I could be your nightmare",           es: "Podría ser tu pesadilla" },
    { t: 92,  en: "And in the middle of the night",      es: "Y en medio de la noche" },
    { t: 98,  en: "I could make you scream...",           es: "Podría hacerte gritar..." },
  ];

  // ── Build DOM ──────────────────────────────────────────────────────
  const container = document.getElementById('lyricsContainer');
  lyrics.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.id = 'line-' + i;
    div.innerHTML = `<div class="en">${line.en}</div><div class="es">${line.es}</div>`;
    container.appendChild(div);
  });

  // ── Audio ──────────────────────────────────────────────────────────
  const audio   = document.getElementById('audio');
  const vinyl   = document.getElementById('vinyl');
  const waveform = document.getElementById('waveform');
  const albumHeader = document.getElementById('albumHeader');
  const fill    = document.getElementById('progressFill');
  const bar     = document.getElementById('progressBar');
  const timeCur = document.getElementById('timeCurrent');
  const timeDur = document.getElementById('timeDuration');
  const iconPlay  = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');

  let isPlaying = false;
  let revealedLines = new Set();

  audio.volume = 0.8;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play().catch(() => {});
    } else {
      audio.pause();
    }
  }

  function seekRelative(delta) {
    audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + delta));
  }

  function setVolume(v) { audio.volume = v; }

  audio.addEventListener('play', () => {
    isPlaying = true;
    vinyl.classList.add('spinning');
    waveform.classList.add('active');
    albumHeader.classList.add('playing');
    iconPlay.style.display = 'none';
    iconPause.style.display = 'block';
  });

  audio.addEventListener('pause', () => {
    isPlaying = false;
    vinyl.classList.remove('spinning');
    waveform.classList.remove('active');
    albumHeader.classList.remove('playing');
    iconPlay.style.display = 'block';
    iconPause.style.display = 'none';
  });

  audio.addEventListener('loadedmetadata', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    fill.style.width = pct + '%';
    timeCur.textContent = fmt(audio.currentTime);

    // Lyrics sync
    const t = audio.currentTime;
    lyrics.forEach((line, i) => {
      const el = document.getElementById('line-' + i);
      const next = lyrics[i + 1];

      // Reveal line when time arrives (and keep revealed)
      if (t >= line.t && !revealedLines.has(i)) {
        revealedLines.add(i);
        el.classList.add('visible');
      }

      // Active highlight
      const isActive = t >= line.t && (!next || t < next.t);
      el.classList.toggle('active', isActive);

      // Auto scroll to active line
      if (isActive) {
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    });
  });

  // Seek by clicking progress bar
  bar.addEventListener('click', (e) => {
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * (audio.duration || 0);
  });

  // Reveal first line on load for visual feedback
  setTimeout(() => {
    document.getElementById('line-0')?.classList.add('visible');
  }, 800);
</script>
</body>
</html>
